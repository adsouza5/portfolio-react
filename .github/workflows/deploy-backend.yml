name: Deploy Backend

on:
  push:
    branches: [main, master]
    paths: [backend/**]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  IMAGE: us-central1-docker.pkg.dev/portfolio-ml-pipeline/backend/api

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Run tests
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pytest test_indicators.py -v

      - name: Authenticate to GCP (keyless)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and push image
        run: |
          BUILD_ID=$(gcloud builds submit backend/ \
            --tag ${{ env.IMAGE }}:${{ github.sha }} \
            --tag ${{ env.IMAGE }}:latest \
            --project portfolio-ml-pipeline \
            --async \
            --format='value(id)')
          echo "Cloud Build ID: $BUILD_ID"
          echo "Logs: https://console.cloud.google.com/cloud-build/builds/${BUILD_ID}?project=portfolio-ml-pipeline"
          while true; do
            STATUS=$(gcloud builds describe $BUILD_ID \
              --project portfolio-ml-pipeline \
              --format='value(status)')
            echo "Status: $STATUS"
            case $STATUS in
              SUCCESS)  echo "Build succeeded"; break ;;
              FAILURE|TIMEOUT|CANCELLED|EXPIRED)
                echo "Build failed with status: $STATUS"; exit 1 ;;
              *) sleep 15 ;;
            esac
          done

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ml-pipeline-api \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --region us-central1 \
            --platform managed \
            --allow-unauthenticated \
            --service-account ml-pipeline-sa@portfolio-ml-pipeline.iam.gserviceaccount.com \
            --set-env-vars GCP_PROJECT=portfolio-ml-pipeline \
            --max-instances 3 \
            --min-instances 0 \
            --memory 512Mi \
            --cpu 1 \
            --quiet
