name: Deploy Frontend

on:
  push:
    branches: [main, master]
    paths:
      - src/**
      - public/**
      - package.json
      - package-lock.json

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required for gh-pages push

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check Wandbox API
        run: |
          HTTP=$(curl -sf -o /dev/null -w "%{http_code}" \
            -X POST https://wandbox.org/api/compile.json \
            -H "Content-Type: application/json" \
            -d '{"compiler":"cpython-3.12.7","code":"print(1+1)"}')
          if [ "$HTTP" != "200" ]; then
            echo "Wandbox API is unavailable (status: $HTTP) — code execution will not work"
            exit 1
          fi
          echo "Wandbox API healthy (status: $HTTP)"

      - name: Build
        run: npm run build
        env:
          CI: false  # treat warnings as warnings, not errors
          REACT_APP_API_URL: https://ml-pipeline-api-cpktdw5swq-uc.a.run.app
          REACT_APP_LENS_API_URL: https://lens-api-cpktdw5swq-uc.a.run.app

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          cname: www.iadamdsouza.com
