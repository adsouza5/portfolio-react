name: Deploy Backend

on:
  push:
    branches: [main, master]
    paths: [backend/**]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Run tests
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pytest test_indicators.py -v

      - name: Authenticate to GCP (keyless)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and push image
        run: |
          gcloud builds submit backend/ \
            --tag us-central1-docker.pkg.dev/portfolio-ml-pipeline/backend/api:${{ github.sha }} \
            --tag us-central1-docker.pkg.dev/portfolio-ml-pipeline/backend/api:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ml-pipeline-api \
            --image us-central1-docker.pkg.dev/portfolio-ml-pipeline/backend/api:${{ github.sha }} \
            --region us-central1 \
            --platform managed \
            --allow-unauthenticated \
            --service-account ml-pipeline-sa@portfolio-ml-pipeline.iam.gserviceaccount.com \
            --set-env-vars GCP_PROJECT=portfolio-ml-pipeline \
            --max-instances 3 \
            --min-instances 0 \
            --memory 512Mi \
            --cpu 1 \
            --quiet
